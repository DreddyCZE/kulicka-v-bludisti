<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#63c8ff">
  <meta name="build" content="external-assets-v17">
  <title>Kouzelná zahrada – větší herní prvky</title>
  <link rel="stylesheet" href="css/phaser.css?v=17">
</head>
<body>
  <main id="game-shell">
    <header class="hud">
      <div class="profile">
        <div class="portrait" aria-label="Lili">🦄</div>
        <div><strong>Lili</strong><small>Květinová louka</small></div>
      </div>
      <div class="counter"><span>⭐</span><b id="stars">0 / 5</b></div>
      <div class="counter"><span>🔑</span><b id="keys">0 / 1</b></div>
      <button id="restart" aria-label="Restartovat úroveň">↻</button>
    </header>
    <section id="game"></section>
    <div id="message" role="status"></div>
    <div id="sensor-status">Nakláněj telefon nebo použij joystick</div>
    <div id="joystick" aria-label="Dotykový joystick"><div id="joystick-knob"></div></div>
    <div id="intro" class="modal">
      <div class="card">
        <div class="big-unicorn">🦄</div>
        <h1>Kouzelná zahrada</h1>
        <p>Hvězdy, klíček, jezírka, brána i Lili jsou nyní větší a lépe viditelné.</p>
        <button id="play">Hrát</button>
        <small class="version">Větší herní prvky v17</small>
      </div>
    </div>
  </main>
  <script>navigator.serviceWorker?.getRegistrations().then(rs=>rs.forEach(r=>r.update()));</script>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.90.0/dist/phaser.min.js"></script>
  <script src="js/control-mode-v15.js?v=17"></script>
  <script src="js/external-assets-v15.js?v=17"></script>
  <script src="js/visual-scale-v17.js?v=17"></script>
  <script type="module">
    await (window.GARDEN_ASSET_BOOT ?? Promise.resolve(false));
    await import('./js/phaser-game-v10.js?v=17');
  </script>
</body>
</html>
