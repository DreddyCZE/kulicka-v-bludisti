<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{width:100%;height:100%;margin:0;overflow:hidden;font-family:system-ui,sans-serif;touch-action:none;color:#56345f}button,select{font:inherit}.app{height:100%;display:grid;grid-template-rows:auto 1fr auto;gap:7px;padding:max(7px,env(safe-area-inset-top)) 8px max(7px,env(safe-area-inset-bottom));background:linear-gradient(#8bdcff,#dfffd9)}.top,.bottom{display:flex;align-items:center;justify-content:space-between;gap:7px;flex-wrap:wrap;background:#fff9;border:2px solid #fff;border-radius:18px;padding:7px 9px;box-shadow:0 5px 16px #78527a28;backdrop-filter:blur(8px)}.stats{display:flex;gap:12px;align-items:center}.stat{display:grid;text-align:center}.label{font-size:9px;color:#8a668d;font-weight:900}.value{font-size:15px;font-weight:1000}.btn,select{border:0;border-radius:14px;padding:9px 11px;background:#fff;color:#704d79;font-weight:900;box-shadow:0 3px 0 #dfb9df}.btn:active{transform:translateY(2px);box-shadow:0 1px 0 #dfb9df}.pink{background:#ff70b7;color:#fff;box-shadow:0 3px 0 #cf458d}.wrap{min-height:0;position:relative;display:grid;place-items:center}canvas{display:block;width:100%;height:100%;border-radius:22px;box-shadow:0 12px 30px #57325c35;border:3px solid #fff}.overlay{position:absolute;inset:0;display:grid;place-items:center;padding:16px;background:#704d7966;border-radius:22px;z-index:5}.hidden{display:none!important}.card{max-width:460px;width:min(94%,460px);max-height:92%;overflow:auto;background:linear-gradient(#fff,#fff0fa);border:4px solid #fff;border-radius:28px;padding:18px;text-align:center;box-shadow:0 16px 45px #56345f55}.card h1{margin:0 0 7px;font-size:clamp(25px,7vw,40px);color:#f04b9b}.card h2{margin:9px 0 5px}.card p{margin:7px 0 14px;line-height:1.35;font-weight:750}.big{font-size:18px;padding:13px 20px;border-radius:18px}.hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);white-space:nowrap;background:#fffbd9dd;border:2px solid #fff;padding:5px 10px;border-radius:20px;font-size:11px;font-weight:900;color:#7d5b66;pointer-events:none}.toast{position:absolute;top:12%;left:50%;transform:translate(-50%,-20px) scale(.8);opacity:0;background:#fff;border:3px solid #ffb9df;border-radius:24px;padding:10px 18px;font-size:22px;font-weight:1000;color:#f04b9b;z-index:4;transition:.25s}.toast.show{opacity:1;transform:translate(-50%,0) scale(1)}.characters,.worlds{display:flex;justify-content:center;gap:8px;margin:10px 0;flex-wrap:wrap}.char,.world{font-size:31px;padding:6px 9px;border-radius:15px;border:3px solid transparent;background:#f5eafa;min-width:66px}.world{font-size:25px}.locked{filter:grayscale(1);opacity:.45}.selected{border-color:#ff70b7;background:#fff}.bottom{justify-content:center}.status{font-size:10px;font-weight:850;color:#8a668d}.starsUI{letter-spacing:1px;color:#ffb300}.progress{height:12px;border-radius:999px;background:#ead9ee;overflow:hidden;margin:8px 0}.progress>div{height:100%;background:linear-gradient(90deg,#ff70b7,#ffd43b);transition:.3s}.badge{display:inline-block;background:#fff3bd;border-radius:14px;padding:6px 10px;font-weight:900;margin:3px}.small{font-size:11px}

<body>
<div class="app"><div class="top"><div class="stats"><div class="stat"><span class="label">ГҡROVEЕҮ</span><span id="level" class="value">1</span></div><div class="stat"><span class="label">HVДҡZDIДҢKY</span><span id="starCount" class="value starsUI">0 / 3</span></div><div class="stat"><span class="label">ODMДҡNY</span><span id="totalStars" class="value">вӯҗ 0</span></div><div class="stat"><span class="label">SVДҡT</span><span id="worldName" class="value">Louka</span></div></div><button id="restart" class="btn">вҶ» NovГЎ mapa</button></div><div id="wrap" class="wrap"><canvas id="game"></canvas><div id="toast" class="toast">SkvДӣlГ©! вӯҗ</div><div id="mission" class="hint">PosbГӯrej vЕЎechny hvДӣzdiДҚky</div><div id="overlay" class="overlay"><div class="card"><div style="font-size:58px">рҹҰ„рҹҢёрҹҢҲ</div><h1>KouzelnГЎ zahrada</h1><p>PosbГӯrej hvДӣzdiДҚky, najdi klГӯДҚek a otevЕҷi duhovou brГЎnu.</p><button id="start" class="btn pink big">ZaДҚГӯt dobrodruЕҫstvГӯ</button></div></div></div><div class="bottom"><select id="difficulty"><option value="easy" selected>MalГЎ zahrada</option><option value="medium">VelkГЎ zahrada</option></select><button id="worlds" class="btn">рҹҢҚ SvДӣty</button><button id="characters" class="btn">рҹҰ„ PostaviДҚky</button><button id="album" class="btn">рҹҸҶ Album</button><button id="calibrate" class="btn">вҡ–пёҸ Srovnat</button><span id="status" class="status">Senzor ДҚekГЎ</span></div></div>
<script>
(()=>{'use strict';
const $=id=>document.getElementById(id),canvas=$('game'),ctx=canvas.getContext('2d'),wrap=$('wrap'),overlay=$('overlay'),toast=$('toast');
const presets={easy:{cols:8,rows:11,accel:430,max:280,stars:3,puddles:1,clouds:1},medium:{cols:11,rows:15,accel:500,max:330,stars:5,puddles:2,clouds:2}};
const chars=[{e:'рҹҰ„',n:'JednoroЕҫec',need:0},{e:'рҹҗұ',n:'KoДҚiДҚka',need:6},{e:'рҹҗј',n:'Panda',need:15},{e:'рҹҗһ',n:'BeruЕЎka',need:30},{e:'рҹҗ°',n:'KrГЎlГӯДҚek',need:50},{e:'рҹҰӢ',n:'MotГҪlek',need:75}];
const worlds=[{n:'KvДӣtinovГЎ louka',short:'Louka',e:'рҹҢё',need:0,sky:['#9ee6ff','#d7ffd4','#8bd36a'],floor:'#dff5a7',wall:'#5f9f48',edge:'#b9e979',decor:['рҹҢё','рҹҢј','рҹҢ·','рҹҰӢ']},{n:'KouzelnГҪ les',short:'Les',e:'рҹҢі',need:12,sky:['#bde9c6','#80c49a','#457a55'],floor:'#cde8a2',wall:'#386b45',edge:'#84ba62',decor:['рҹҢҝ','рҹҚ„','рҹҢј','рҹҰү']},{n:'DuhovГЎ zemДӣ',short:'Duha',e:'рҹҢҲ',need:28,sky:['#ffd0ec','#fff0a8','#a8e9ff'],floor:'#fff1c9',wall:'#b56caf',edge:'#ff9bd4',decor:['вңЁ','рҹ’–','рҹҢҲ','вҳҒпёҸ']},{n:'LedovГ© krГЎlovstvГӯ',short:'Led',e:'вқ„пёҸ',need:48,sky:['#dff8ff','#b7e8ff','#8ec7ef'],floor:'#eafcff',wall:'#5a9bc6',edge:'#bfefff',decor:['вқ„пёҸ','рҹ§Ҡ','вӣ„','вңЁ']},{n:'Princeznin hrad',short:'Hrad',e:'рҹ‘‘',need:72,sky:['#f7d4ff','#e5c2ff','#b990dd'],floor:'#f5e8ff',wall:'#8455a3',edge:'#d9a9f0',decor:['рҹ‘‘','рҹ’Һ','рҹҢ№','вңЁ']}];
let cfg=presets.easy,maze=[],cell=25,ox=0,oy=0,wall=4,ball={x:0,y:0,vx:0,vy:0,r:8},goal={x:0,y:0,r:14,open:false},stars=[],key={x:0,y:0,cx:0,cy:0,taken:false},puddles=[],clouds=[],particles=[],decor=[],tilt={x:0,y:0},raw={x:0,y:0},cal={beta:0,gamma:0},running=false,done=false,last=performance.now(),sensorSeen=false,drag=null,audio=null;
let level=+(localStorage.magicLevel||1),total=+(localStorage.magicStars||0),charIndex=+(localStorage.magicChar||0),worldIndex=+(localStorage.magicWorld||0),badges=JSON.parse(localStorage.magicBadges||'[]');
function save(){localStorage.magicLevel=level;localStorage.magicStars=total;localStorage.magicChar=charIndex;localStorage.magicWorld=worldIndex;localStorage.magicBadges=JSON.stringify(badges)}
function tone(freq,d=.16,slide=0){try{audio=audio||new(window.AudioContext||window.webkitAudioContext)();let o=audio.createOscillator(),g=audio.createGain(),now=audio.currentTime;o.connect(g);g.connect(audio.destination);o.frequency.setValueAtTime(freq,now);if(slide)o.frequency.linearRampToValueAtTime(slide,now+d);g.gain.setValueAtTime(.11,now);g.gain.exponentialRampToValueAtTime(.001,now+d);o.start(now);o.stop(now+d)}catch{}}
function sound(type){if(type==='star')tone(880,.18,1100);if(type==='key')tone(660,.25,990);if(type==='win'){tone(523,.5,1046);setTimeout(()=>tone(784,.35,1175),170)}if(type==='bump')tone(220,.08,180)}
function praise(text){toast.textContent=text;toast.classList.add('show');clearTimeout(praise.t);praise.t=setTimeout(()=>toast.classList.remove('show'),900)}
function roundedRect(x,y,w,h,r){ctx.beginPath();ctx.roundRect?ctx.roundRect(x,y,w,h,r):ctx.rect(x,y,w,h)}
function generate(){maze=Array.from({length:cfg.rows},(_,y)=>Array.from({length:cfg.cols},(_,x)=>({x,y,seen:false,w:{t:1,r:1,b:1,l:1}})));let cur=maze[0][0],stack=[],seen=1,totalCells=cfg.cols*cfg.rows;cur.seen=true;while(seen<totalCells){let n=[],x=cur.x,y=cur.y;if(y&&!maze[y-1][x].seen)n.push(['t',maze[y-1][x]]);if(x<cfg.cols-1&&!maze[y][x+1].seen)n.push(['r',maze[y][x+1]]);if(y<cfg.rows-1&&!maze[y+1][x].seen)n.push(['b',maze[y+1][x]]);if(x&&!maze[y][x-1].seen)n.push(['l',maze[y][x-1]]);if(n.length){let[d,next]=n[Math.floor(Math.random()*n.length)];stack.push(cur);if(d==='t'){cur.w.t=0;next.w.b=0}if(d==='r'){cur.w.r=0;next.w.l=0}if(d==='b'){cur.w.b=0;next.w.t=0}if(d==='l'){cur.w.l=0;next.w.r=0}cur=next;cur.seen=true;seen++}else cur=stack.pop()}for(let i=0;i<Math.floor(totalCells*.13);i++){let x=Math.floor(Math.random()*cfg.cols),y=Math.floor(Math.random()*cfg.rows);if(x<cfg.cols-1&&Math.random()<.5){maze[y][x].w.r=0;maze[y][x+1].w.l=0}else if(y<cfg.rows-1){maze[y][x].w.b=0;maze[y+1][x].w.t=0}}}
function randomCell(used){for(let tries=0;tries<200;tries++){let x=Math.floor(Math.random()*cfg.cols),y=Math.floor(Math.random()*cfg.rows),k=x+','+y;if(!used.has(k)){used.add(k);return{x,y}}}return{x:1,y:1}}
function placeObjects(){let used=new Set(['0,0',`${cfg.cols-1},${cfg.rows-1}`]);stars=[];for(let i=0;i<cfg.stars;i++){let c=randomCell(used);stars.push({cx:c.x,cy:c.y,x:0,y:0,taken:false,p:Math.random()*6})}let kc=randomCell(used);key={cx:kc.x,cy:kc.y,x:0,y:0,taken:false};puddles=[];for(let i=0;i<cfg.puddles;i++){let c=randomCell(used);puddles.push({cx:c.x,cy:c.y,x:0,y:0,r:0})}clouds=[];for(let i=0;i<cfg.clouds;i++){let c=randomCell(used);clouds.push({cx:c.x,cy:c.y,x:0,y:0,phase:Math.random()*6})}decor=Array.from({length:28},()=>({x:Math.random(),y:Math.random(),e:worlds[worldIndex].decor[Math.floor(Math.random()*4)],s:10+Math.random()*11}))}
function resize(){let r=wrap.getBoundingClientRect(),d=Math.min(devicePixelRatio||1,2);canvas.width=Math.floor(r.width*d);canvas.height=Math.floor(r.height*d);canvas.style.width=r.width+'px';canvas.style.height=r.height+'px';ctx.setTransform(d,0,0,d,0,0);cell=Math.max(18,Math.floor(Math.min((r.width-18)/cfg.cols,(r.height-18)/cfg.rows)));ox=Math.floor((r.width-cfg.cols*cell)/2);oy=Math.floor((r.height-cfg.rows*cell)/2);wall=Math.max(4,cell*.13);ball.r=Math.max(9,cell*.28);goal.r=Math.max(12,cell*.34);resetPositions()}
function resetPositions(){ball.x=ox+cell/2;ball.y=oy+cell/2;ball.vx=ball.vy=0;goal.x=ox+(cfg.cols-.5)*cell;goal.y=oy+(cfg.rows-.5)*cell;for(let s of stars){s.x=ox+(s.cx+.5)*cell;s.y=oy+(s.cy+.5)*cell}key.x=ox+(key.cx+.5)*cell;key.y=oy+(key.cy+.5)*cell;for(let p of puddles){p.x=ox+(p.cx+.5)*cell;p.y=oy+(p.cy+.5)*cell;p.r=cell*.34}for(let c of clouds){c.x=ox+(c.cx+.5)*cell;c.y=oy+(c.cy+.5)*cell}}
function updateUI(){let got=stars.filter(s=>s.taken).length;$('starCount').textContent=`${got} / ${stars.length}`;$('totalStars').textContent='вӯҗ '+total;$('level').textContent=level;$('worldName').textContent=worlds[worldIndex].short;$('mission').textContent=!key.taken?'Najdi hvДӣzdiДҚky a zlatГҪ klГӯДҚek рҹ”‘':got<stars.length?'JeЕЎtДӣ pГЎr hvДӣzdiДҚek вӯҗ':'DuhovГЎ brГЎna je otevЕҷenГЎ рҹҢҲ'}
function newGame(){cfg=presets[$('difficulty').value];done=false;generate();placeObjects();resize();goal.open=false;particles=[];updateUI();running=true}
function orientation(e){if(e.beta==null||e.gamma==null)return;sensorSeen=true;$('status').textContent='NГЎklon funguje вң“';let g=e.gamma-cal.gamma,b=e.beta-cal.beta,a=screen.orientation?.angle??window.orientation??0,x=g,y=b;if(a===90){x=b;y=-g}else if(a===270||a===-90){x=-b;y=g}else if(a===180){x=-g;y=-b}raw={x,y};tilt.x+=(Math.max(-22,Math.min(22,x))/22-tilt.x)*.18;tilt.y+=(Math.max(-22,Math.min(22,y))/22-tilt.y)*.18}
async function sensors(){try{if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){if(await DeviceOrientationEvent.requestPermission()!=='granted')throw Error()}addEventListener('deviceorientation',orientation,true);$('status').textContent='ДҢekГЎm na nГЎklonвҖҰ';setTimeout(()=>{if(!sensorSeen)$('status').textContent='MЕҜЕҫeЕЎ pouЕҫГӯt prst'},1800)}catch{$('status').textContent='PouЕҫij ovlГЎdГЎnГӯ prstem'}}
function current(){let x=Math.floor((ball.x-ox)/cell),y=Math.floor((ball.y-oy)/cell);return x>=0&&y>=0&&x<cfg.cols&&y<cfg.rows?maze[y][x]:null}
function collide(axis){let bumped=false;for(let i=0;i<3;i++){let c=current();if(!c){resetPositions();return}let l=ox+c.x*cell,t=oy+c.y*cell,r=l+cell,b=t+cell,p=wall/2;if(axis==='x'){if(c.w.l&&ball.x-ball.r<l+p){ball.x=l+p+ball.r;ball.vx=Math.abs(ball.vx)*.2;bumped=true}if(c.w.r&&ball.x+ball.r>r-p){ball.x=r-p-ball.r;ball.vx=-Math.abs(ball.vx)*.2;bumped=true}}else{if(c.w.t&&ball.y-ball.r<t+p){ball.y=t+p+ball.r;ball.vy=Math.abs(ball.vy)*.2;bumped=true}if(c.w.b&&ball.y+ball.r>b-p){ball.y=b-p-ball.r;ball.vy=-Math.abs(ball.vy)*.2;bumped=true}}}if(bumped&&Math.random()<.03)sound('bump')}
function burst(x,y,count=18){for(let i=0;i<count;i++)particles.push({x,y,vx:(Math.random()-.5)*180,vy:(Math.random()-.8)*180,life:1,e:['вӯҗ','рҹ’–','вңЁ','рҹҢё'][Math.floor(Math.random()*4)]})}
function unlockBadges(){let defs=[['PrvnГӯ dobrodruЕҫstvГӯ',1,'рҹҢҹ'],['SbДӣratelka',15,'рҹҸ…'],['OdvГЎЕҫnГЎ prЕҜzkumnice',35,'рҹ§ӯ'],['KrГЎlovna zahrady',75,'рҹ‘‘']];for(let d of defs)if(total>=d[1]&&!badges.includes(d[0])){badges.push(d[0]);praise('NovГЎ odmДӣna '+d[2]);save()}}
function win(){done=true;running=false;level++;let reward=cfg.stars+2;total+=reward;unlockBadges();save();sound('win');burst(goal.x,goal.y,55);if(navigator.vibrate)navigator.vibrate([60,40,100]);setTimeout(()=>{let unlockedChar=chars.find(c=>c.need<=total&&c.need>total-reward),unlockedWorld=worlds.find(w=>w.need<=total&&w.need>total-reward);overlay.innerHTML=`<div class="card"><div style="font-size:65px">рҹҢҲрҹҺү${chars[charIndex].e}</div><h1>DokГЎzala jsi to!</h1><p>ZГӯskГЎvГЎЕЎ <b>вӯҗ ${reward}</b>.${unlockedChar?'<br>NovГҪ kamarГЎd: <b>'+unlockedChar.e+' '+unlockedChar.n+'</b>':''}${unlockedWorld?'<br>NovГҪ svДӣt: <b>'+unlockedWorld.e+' '+unlockedWorld.n+'</b>':''}</p><button id="again" class="btn pink big">DalЕЎГӯ dobrodruЕҫstvГӯ</button></div>`;overlay.classList.remove('hidden');$('again').onclick=()=>{overlay.classList.add('hidden');newGame()}},550)}
function update(dt){dt=Math.min(dt,.025);for(let p of particles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=220*dt;p.life-=dt}particles=particles.filter(p=>p.life>0);if(!running||done)return;let slow=1;for(let p of puddles)if(Math.hypot(ball.x-p.x,ball.y-p.y)<p.r+ball.r)slow=.45;let windX=0,windY=0,t=performance.now()/1000;for(let c of clouds)if(Math.hypot(ball.x-c.x,ball.y-c.y)<cell*.7){windX+=Math.cos(t+c.phase)*.25;windY+=Math.sin(t*.8+c.phase)*.18}ball.vx+=(tilt.x+windX)*cfg.accel*dt;ball.vy+=(tilt.y+windY)*cfg.accel*dt;let f=Math.pow(slow<1?.94:.984,dt*60);ball.vx*=f;ball.vy*=f;let speed=Math.hypot(ball.vx,ball.vy);if(speed>cfg.max){ball.vx=ball.vx/speed*cfg.max;ball.vy=ball.vy/speed*cfg.max}let steps=Math.max(1,Math.ceil(speed*dt/Math.max(3,ball.r*.6))),s=dt/steps;for(let i=0;i<steps;i++){ball.x+=ball.vx*s;collide('x');ball.y+=ball.vy*s;collide('y')}for(let st of stars)if(!st.taken&&Math.hypot(ball.x-st.x,ball.y-st.y)<ball.r+cell*.25){st.taken=true;total++;sound('star');burst(st.x,st.y,14);praise(['SkvДӣlГ©! вӯҗ','ParГЎda! рҹ’–','VГҪbornДӣ! рҹҢё'][Math.floor(Math.random()*3)]);if(navigator.vibrate)navigator.vibrate(35);save();updateUI()}if(!key.taken&&Math.hypot(ball.x-key.x,ball.y-key.y)<ball.r+cell*.25){key.taken=true;sound('key');burst(key.x,key.y,20);praise('NaЕЎla jsi klГӯДҚek! рҹ”‘');updateUI()}goal.open=key.taken&&stars.every(st=>st.taken);if(goal.open&&Math.hypot(ball.x-goal.x,ball.y-goal.y)<goal.r*.95)win()}
function drawStar(x,y,r,rot=0){ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.beginPath();for(let i=0;i<10;i++){let a=-Math.PI/2+i*Math.PI/5,rr=i%2?r*.45:r;ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr)}ctx.closePath();ctx.fillStyle='#ffd43b';ctx.shadowColor='#ffcf33';ctx.shadowBlur=12;ctx.fill();ctx.lineWidth=2;ctx.strokeStyle='#fff8b0';ctx.stroke();ctx.restore();ctx.shadowColor='transparent'}
function draw(){let r=canvas.getBoundingClientRect(),t=performance.now()/1000,w=worlds[worldIndex];ctx.clearRect(0,0,r.width,r.height);let g=ctx.createLinearGradient(0,0,0,r.height);g.addColorStop(0,w.sky[0]);g.addColorStop(.45,w.sky[1]);g.addColorStop(1,w.sky[2]);ctx.fillStyle=g;ctx.fillRect(0,0,r.width,r.height);for(let d of decor){ctx.font=`${d.s}px serif`;ctx.globalAlpha=.55;ctx.fillText(d.e,d.x*r.width,d.y*r.height)}ctx.globalAlpha=1;ctx.fillStyle=w.floor;roundedRect(ox,oy,cfg.cols*cell,cfg.rows*cell,16);ctx.fill();ctx.beginPath();ctx.lineWidth=wall+5;ctx.lineCap='round';ctx.strokeStyle=w.wall;for(let y=0;y<cfg.rows;y++)for(let x=0;x<cfg.cols;x++){let c=maze[y][x],x0=ox+x*cell,y0=oy+y*cell,x1=x0+cell,y1=y0+cell;if(c.w.t){ctx.moveTo(x0,y0);ctx.lineTo(x1,y0)}if(c.w.l){ctx.moveTo(x0,y0);ctx.lineTo(x0,y1)}if(x===cfg.cols-1&&c.w.r){ctx.moveTo(x1,y0);ctx.lineTo(x1,y1)}if(y===cfg.rows-1&&c.w.b){ctx.moveTo(x0,y1);ctx.lineTo(x1,y1)}}ctx.stroke();ctx.strokeStyle=w.edge;ctx.lineWidth=wall;ctx.stroke();for(let p of puddles){ctx.globalAlpha=.72;ctx.fillStyle=worldIndex===3?'#b8edff':'#6cccf2';ctx.beginPath();ctx.ellipse(p.x,p.y,p.r,p.r*.62,.2,0,7);ctx.fill()}ctx.globalAlpha=1;for(let c of clouds){ctx.font=`${cell*.65}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('вҳҒпёҸ',c.x,c.y+Math.sin(t+c.phase)*3)}for(let s of stars)if(!s.taken)drawStar(s.x,s.y,cell*.27,t*1.6+s.p);if(!key.taken){ctx.font=`${cell*.62}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('рҹ”‘',key.x,key.y)}ctx.font=`${goal.r*1.8}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.globalAlpha=goal.open?1:.35;ctx.fillText('рҹҢҲ',goal.x,goal.y);ctx.globalAlpha=1;if(!goal.open){ctx.font=`${goal.r*.85}px serif`;ctx.fillText('рҹ”’',goal.x,goal.y+2)}ctx.save();ctx.translate(ball.x,ball.y);ctx.font=`${ball.r*2.25}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='#fff';ctx.shadowBlur=8;ctx.fillText(chars[charIndex]?.e||'рҹҰ„',0,1);ctx.restore();for(let p of particles){ctx.globalAlpha=Math.max(0,p.life);ctx.font='18px serif';ctx.fillText(p.e,p.x,p.y)}ctx.globalAlpha=1}
function loop(now){update((now-last)/1000);last=now;draw();requestAnimationFrame(loop)}
function characterMenu(){let buttons=chars.map((c,i)=>`<button class="char ${c.need>total?'locked':''} ${i===charIndex?'selected':''}" data-i="${i}" ${c.need>total?'disabled':''}>${c.e}<small style="display:block;font-size:9px">${c.need>total?'вӯҗ '+c.need:c.n}</small></button>`).join('');overlay.innerHTML=`<div class="card"><h1>Vyber kamarГЎda</h1><div class="characters">${buttons}</div><p>NovГӯ kamarГЎdi se odemykajГӯ za hvДӣzdiДҚky.</p><button id="closeChars" class="btn pink">Hotovo</button></div>`;overlay.classList.remove('hidden');overlay.querySelectorAll('.char:not(.locked)').forEach(b=>b.onclick=()=>{charIndex=+b.dataset.i;save();characterMenu()});$('closeChars').onclick=()=>overlay.classList.add('hidden')}
function worldMenu(){let buttons=worlds.map((w,i)=>`<button class="world ${w.need>total?'locked':''} ${i===worldIndex?'selected':''}" data-i="${i}" ${w.need>total?'disabled':''}>${w.e}<small style="display:block;font-size:9px">${w.need>total?'вӯҗ '+w.need:w.short}</small></button>`).join('');overlay.innerHTML=`<div class="card"><h1>Vyber kouzelnГҪ svДӣt</h1><div class="worlds">${buttons}</div><p>KaЕҫdГҪ svДӣt mГЎ jinГ© barvy a atmosfГ©ru.</p><button id="closeWorlds" class="btn pink">Hotovo</button></div>`;overlay.classList.remove('hidden');overlay.querySelectorAll('.world:not(.locked)').forEach(b=>b.onclick=()=>{worldIndex=+b.dataset.i;save();worldMenu();newGame()});$('closeWorlds').onclick=()=>overlay.classList.add('hidden')}
function albumMenu(){let defs=[['PrvnГӯ dobrodruЕҫstvГӯ',1,'рҹҢҹ'],['SbДӣratelka',15,'рҹҸ…'],['OdvГЎЕҫnГЎ prЕҜzkumnice',35,'рҹ§ӯ'],['KrГЎlovna zahrady',75,'рҹ‘‘']],items=defs.map(d=>`<span class="badge ${badges.includes(d[0])?'':'locked'}">${d[2]} ${d[0]}</span>`).join(''),next=worlds.find(w=>w.need>total)||chars.find(c=>c.need>total),pct=next?Math.min(100,total/next.need*100):100;overlay.innerHTML=`<div class="card"><h1>Album odmДӣn</h1><div style="font-size:48px">вӯҗ ${total}</div><div class="progress"><div style="width:${pct}%"></div></div><p class="small">${next?'DalЕЎГӯ odmДӣna pЕҷi вӯҗ '+next.need:'VЕЎechno je odemДҚeno!'}</p><div>${items}</div><h2>KamarГЎdi</h2><div>${chars.filter(c=>c.need<=total).map(c=>`<span class="badge">${c.e}</span>`).join('')}</div><h2>SvДӣty</h2><div>${worlds.filter(w=>w.need<=total).map(w=>`<span class="badge">${w.e}</span>`).join('')}</div><button id="closeAlbum" class="btn pink">Hotovo</button></div>`;overlay.classList.remove('hidden');$('closeAlbum').onclick=()=>overlay.classList.add('hidden')}
canvas.onpointerdown=e=>{drag={x:e.clientX,y:e.clientY};canvas.setPointerCapture(e.pointerId)};canvas.onpointermove=e=>{if(drag){tilt.x=Math.max(-1,Math.min(1,(e.clientX-drag.x)/65));tilt.y=Math.max(-1,Math.min(1,(e.clientY-drag.y)/65))}};canvas.onpointerup=canvas.onpointercancel=()=>{drag=null;tilt.x*=.15;tilt.y*=.15};
$('start').onclick=async()=>{await sensors();overlay.classList.add('hidden');newGame()};$('restart').onclick=newGame;$('difficulty').onchange=newGame;$('characters').onclick=characterMenu;$('worlds').onclick=worldMenu;$('album').onclick=albumMenu;$('calibrate').onclick=()=>{cal.beta+=raw.y;cal.gamma+=raw.x;raw={x:0,y:0};tilt={x:0,y:0};$('status').textContent='NГЎklon srovnГЎn вң“'};addEventListener('resize',resize);if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});generate();placeObjects();resize();updateUI();requestAnimationFrame(loop);
})();
