<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#ff87c8">
<link rel="manifest" href="manifest.json">
<title>Kouzelná zahrada</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{width:100%;height:100%;margin:0;overflow:hidden;font-family:system-ui,sans-serif;touch-action:none;background:linear-gradient(#8bdcff,#dfffd9);color:#56345f}button,select{font:inherit}.app{height:100%;display:grid;grid-template-rows:auto 1fr auto;gap:7px;padding:max(7px,env(safe-area-inset-top)) 8px max(7px,env(safe-area-inset-bottom))}.top,.bottom{display:flex;align-items:center;justify-content:space-between;gap:7px;flex-wrap:wrap;background:#fff9;border:2px solid #fff;border-radius:18px;padding:7px 9px;box-shadow:0 5px 16px #78527a28;backdrop-filter:blur(8px)}.stats{display:flex;gap:13px;align-items:center}.stat{display:grid;text-align:center}.label{font-size:10px;color:#8a668d;font-weight:800}.value{font-size:16px;font-weight:900}.btn,select{border:0;border-radius:14px;padding:9px 12px;background:#fff;color:#704d79;font-weight:900;box-shadow:0 3px 0 #dfb9df}.btn:active{transform:translateY(2px);box-shadow:0 1px 0 #dfb9df}.pink{background:#ff70b7;color:white;box-shadow:0 3px 0 #cf458d}.wrap{min-height:0;position:relative;display:grid;place-items:center}canvas{display:block;width:100%;height:100%;border-radius:22px;box-shadow:0 12px 30px #57325c35;border:3px solid #fff}.overlay{position:absolute;inset:0;display:grid;place-items:center;padding:16px;background:#704d7966;border-radius:22px;z-index:5}.hidden{display:none!important}.card{max-width:430px;width:min(92%,430px);background:linear-gradient(#fff,#fff0fa);border:4px solid #fff;border-radius:28px;padding:20px;text-align:center;box-shadow:0 16px 45px #56345f55}.card h1{margin:0 0 8px;font-size:clamp(26px,7vw,42px);color:#f04b9b}.card p{margin:7px 0 16px;line-height:1.4;font-weight:700}.big{font-size:18px;padding:13px 20px;border-radius:18px}.hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);white-space:nowrap;background:#fffbd9dd;border:2px solid #fff;padding:5px 10px;border-radius:20px;font-size:11px;font-weight:900;color:#7d5b66;pointer-events:none}.toast{position:absolute;top:12%;left:50%;transform:translate(-50%,-20px) scale(.8);opacity:0;background:#fff;border:3px solid #ffb9df;border-radius:24px;padding:10px 18px;font-size:22px;font-weight:1000;color:#f04b9b;z-index:4;transition:.25s}.toast.show{opacity:1;transform:translate(-50%,0) scale(1)}.characters{display:flex;justify-content:center;gap:8px;margin:10px 0}.char{font-size:34px;padding:5px 9px;border-radius:15px;border:3px solid transparent;background:#f5eafa}.char.locked{filter:grayscale(1);opacity:.45}.char.selected{border-color:#ff70b7;background:#fff}.bottom{justify-content:center}.status{font-size:11px;font-weight:800;color:#8a668d}.starsUI{letter-spacing:2px;color:#ffb300}
</style>
</head>
<body>
<div class="app">
 <div class="top">
  <div class="stats"><div class="stat"><span class="label">ÚROVEŇ</span><span id="level" class="value">1</span></div><div class="stat"><span class="label">HVĚZDIČKY</span><span id="starCount" class="value starsUI">0 / 3</span></div><div class="stat"><span class="label">ODMĚNY</span><span id="totalStars" class="value">⭐ 0</span></div></div>
  <button id="restart" class="btn">↻ Nová zahrada</button>
 </div>
 <div id="wrap" class="wrap">
  <canvas id="game"></canvas><div id="toast" class="toast">Skvělé! ⭐</div><div class="hint">Nakláněj tablet nebo táhni prstem</div>
  <div id="overlay" class="overlay"><div class="card"><div style="font-size:58px">🦄🌸🌈</div><h1>Kouzelná zahrada</h1><p>Pomoz jednorožci posbírat všechny hvězdičky. Potom najdi duhovou bránu!</p><button id="start" class="btn pink big">Začít dobrodružství</button></div></div>
 </div>
 <div class="bottom"><select id="difficulty"><option value="easy" selected>Malá zahrada</option><option value="medium">Velká zahrada</option></select><button id="characters" class="btn">🦄 Postavičky</button><button id="calibrate" class="btn">⚖️ Srovnat náklon</button><span id="status" class="status">Senzor čeká</span></div>
</div>
<script>
(()=>{'use strict';
const $=id=>document.getElementById(id),canvas=$('game'),ctx=canvas.getContext('2d'),wrap=$('wrap'),overlay=$('overlay'),toast=$('toast');
const presets={easy:{cols:8,rows:11,accel:430,max:280,stars:3},medium:{cols:11,rows:15,accel:500,max:330,stars:5}};
const chars=[{e:'🦄',n:'Jednorožec',need:0},{e:'🐱',n:'Kočička',need:6},{e:'🐼',n:'Panda',need:15},{e:'🐞',n:'Beruška',need:30}];
let cfg=presets.easy,maze=[],cell=25,ox=0,oy=0,wall=4,ball={x:0,y:0,vx:0,vy:0,r:8},goal={x:0,y:0,r:14,open:false},stars=[],particles=[],flowers=[],tilt={x:0,y:0},raw={x:0,y:0},cal={beta:0,gamma:0},running=false,done=false,last=performance.now(),sensorSeen=false,drag=null,level=+(localStorage.magicLevel||1),total=+(localStorage.magicStars||0),charIndex=+(localStorage.magicChar||0),audio=null;
function save(){localStorage.magicLevel=level;localStorage.magicStars=total;localStorage.magicChar=charIndex}
function sound(type){try{audio=audio||new(window.AudioContext||window.webkitAudioContext)();let o=audio.createOscillator(),g=audio.createGain();o.connect(g);g.connect(audio.destination);let now=audio.currentTime,f=type==='win'?523:type==='star'?880:660;o.frequency.setValueAtTime(f,now);if(type==='win')o.frequency.linearRampToValueAtTime(1046,now+.45);g.gain.setValueAtTime(.12,now);g.gain.exponentialRampToValueAtTime(.001,now+(type==='win'?.55:.18));o.start(now);o.stop(now+(type==='win'?.55:.2))}catch{}}
function praise(text){toast.textContent=text;toast.classList.add('show');clearTimeout(praise.t);praise.t=setTimeout(()=>toast.classList.remove('show'),900)}
function generate(){maze=Array.from({length:cfg.rows},(_,y)=>Array.from({length:cfg.cols},(_,x)=>({x,y,seen:false,w:{t:1,r:1,b:1,l:1}})));let cur=maze[0][0],stack=[],seen=1,totalCells=cfg.cols*cfg.rows;cur.seen=true;while(seen<totalCells){let n=[],x=cur.x,y=cur.y;if(y&&!maze[y-1][x].seen)n.push(['t',maze[y-1][x]]);if(x<cfg.cols-1&&!maze[y][x+1].seen)n.push(['r',maze[y][x+1]]);if(y<cfg.rows-1&&!maze[y+1][x].seen)n.push(['b',maze[y+1][x]]);if(x&&!maze[y][x-1].seen)n.push(['l',maze[y][x-1]]);if(n.length){let [d,next]=n[Math.floor(Math.random()*n.length)];stack.push(cur);if(d==='t'){cur.w.t=0;next.w.b=0}if(d==='r'){cur.w.r=0;next.w.l=0}if(d==='b'){cur.w.b=0;next.w.t=0}if(d==='l'){cur.w.l=0;next.w.r=0}cur=next;cur.seen=true;seen++}else cur=stack.pop()}for(let i=0;i<Math.floor(totalCells*.12);i++){let x=Math.floor(Math.random()*cfg.cols),y=Math.floor(Math.random()*cfg.rows);if(x<cfg.cols-1&&Math.random()<.5){maze[y][x].w.r=0;maze[y][x+1].w.l=0}else if(y<cfg.rows-1){maze[y][x].w.b=0;maze[y+1][x].w.t=0}}}
function placeObjects(){stars=[];let used=new Set(['0,0',`${cfg.cols-1},${cfg.rows-1}`]);while(stars.length<cfg.stars){let x=1+Math.floor(Math.random()*(cfg.cols-1)),y=Math.floor(Math.random()*cfg.rows),k=x+','+y;if(!used.has(k)){used.add(k);stars.push({cx:x,cy:y,x:0,y:0,taken:false,p:Math.random()*6})}}flowers=Array.from({length:25},()=>({x:Math.random(),y:Math.random(),e:['🌸','🌼','🌷','🦋'][Math.floor(Math.random()*4)],s:10+Math.random()*10}))}
function resize(){let r=wrap.getBoundingClientRect(),d=Math.min(devicePixelRatio||1,2);canvas.width=Math.floor(r.width*d);canvas.height=Math.floor(r.height*d);canvas.style.width=r.width+'px';canvas.style.height=r.height+'px';ctx.setTransform(d,0,0,d,0,0);cell=Math.max(18,Math.floor(Math.min((r.width-18)/cfg.cols,(r.height-18)/cfg.rows)));ox=Math.floor((r.width-cfg.cols*cell)/2);oy=Math.floor((r.height-cfg.rows*cell)/2);wall=Math.max(4,cell*.13);ball.r=Math.max(9,cell*.28);goal.r=Math.max(12,cell*.34);resetPositions()}
function resetPositions(){ball.x=ox+cell/2;ball.y=oy+cell/2;ball.vx=ball.vy=0;goal.x=ox+(cfg.cols-.5)*cell;goal.y=oy+(cfg.rows-.5)*cell;for(let s of stars){s.x=ox+(s.cx+.5)*cell;s.y=oy+(s.cy+.5)*cell}}
function updateUI(){let got=stars.filter(s=>s.taken).length;$('starCount').textContent=`${got} / ${stars.length}`;$('totalStars').textContent='⭐ '+total;$('level').textContent=level}
function newGame(){cfg=presets[$('difficulty').value];done=false;generate();placeObjects();resize();goal.open=false;particles=[];updateUI();running=true}
function orientation(e){if(e.beta==null||e.gamma==null)return;sensorSeen=true;$('status').textContent='Náklon funguje ✓';let g=e.gamma-cal.gamma,b=e.beta-cal.beta,a=screen.orientation?.angle??window.orientation??0,x=g,y=b;if(a===90){x=b;y=-g}else if(a===270||a===-90){x=-b;y=g}else if(a===180){x=-g;y=-b}raw={x,y};tilt.x+=(Math.max(-22,Math.min(22,x))/22-tilt.x)*.18;tilt.y+=(Math.max(-22,Math.min(22,y))/22-tilt.y)*.18}
async function sensors(){try{if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){if(await DeviceOrientationEvent.requestPermission()!=='granted')throw Error()}addEventListener('deviceorientation',orientation,true);$('status').textContent='Čekám na náklon…';setTimeout(()=>{if(!sensorSeen)$('status').textContent='Můžeš použít prst'},1800)}catch{$('status').textContent='Použij ovládání prstem'}}
function current(){let x=Math.floor((ball.x-ox)/cell),y=Math.floor((ball.y-oy)/cell);return x>=0&&y>=0&&x<cfg.cols&&y<cfg.rows?maze[y][x]:null}
function collide(axis){for(let i=0;i<3;i++){let c=current();if(!c){resetPositions();return}let l=ox+c.x*cell,t=oy+c.y*cell,r=l+cell,b=t+cell,p=wall/2;if(axis==='x'){if(c.w.l&&ball.x-ball.r<l+p){ball.x=l+p+ball.r;ball.vx=Math.abs(ball.vx)*.2}if(c.w.r&&ball.x+ball.r>r-p){ball.x=r-p-ball.r;ball.vx=-Math.abs(ball.vx)*.2}}else{if(c.w.t&&ball.y-ball.r<t+p){ball.y=t+p+ball.r;ball.vy=Math.abs(ball.vy)*.2}if(c.w.b&&ball.y+ball.r>b-p){ball.y=b-p-ball.r;ball.vy=-Math.abs(ball.vy)*.2}}}}
function burst(x,y,count=18){for(let i=0;i<count;i++)particles.push({x,y,vx:(Math.random()-.5)*180,vy:(Math.random()-.8)*180,life:1,e:['⭐','💖','✨','🌸'][Math.floor(Math.random()*4)]})}
function win(){done=true;running=false;level++;total+=3;save();sound('win');burst(goal.x,goal.y,50);if(navigator.vibrate)navigator.vibrate([60,40,100]);setTimeout(()=>{let unlocked=chars.find(c=>c.need<=total&&c.need>total-3);overlay.innerHTML=`<div class="card"><div style="font-size:65px">🌈🎉🦄</div><h1>Dokázala jsi to!</h1><p>Všechny hvězdičky jsou doma.${unlocked?'<br><b>Nová postavička: '+unlocked.e+' '+unlocked.n+'</b>':''}</p><button id="again" class="btn pink big">Další dobrodružství</button></div>`;overlay.classList.remove('hidden');$('again').onclick=()=>{overlay.classList.add('hidden');newGame()}},600)}
function update(dt){dt=Math.min(dt,.025);for(let p of particles){p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=220*dt;p.life-=dt}particles=particles.filter(p=>p.life>0);if(!running||done)return;ball.vx+=tilt.x*cfg.accel*dt;ball.vy+=tilt.y*cfg.accel*dt;let f=Math.pow(.984,dt*60);ball.vx*=f;ball.vy*=f;let speed=Math.hypot(ball.vx,ball.vy);if(speed>cfg.max){ball.vx=ball.vx/speed*cfg.max;ball.vy=ball.vy/speed*cfg.max}let steps=Math.max(1,Math.ceil(speed*dt/Math.max(3,ball.r*.6))),s=dt/steps;for(let i=0;i<steps;i++){ball.x+=ball.vx*s;collide('x');ball.y+=ball.vy*s;collide('y')}for(let st of stars)if(!st.taken&&Math.hypot(ball.x-st.x,ball.y-st.y)<ball.r+cell*.3){st.taken=true;total++;save();sound('star');burst(st.x,st.y,14);praise(['Skvělé! ⭐','Paráda! 💖','Výborně! 🌸'][Math.floor(Math.random()*3)]);if(navigator.vibrate)navigator.vibrate(40);updateUI()}goal.open=stars.every(s=>s.taken);if(goal.open&&Math.hypot(ball.x-goal.x,ball.y-goal.y)<goal.r)win()}
function roundedRect(x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,r)}
function drawStar(x,y,r,rot=0){ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.beginPath();for(let i=0;i<10;i++){let a=-Math.PI/2+i*Math.PI/5,rr=i%2?r*.45:r;ctx.lineTo(Math.cos(a)*rr,Math.sin(a)*rr)}ctx.closePath();ctx.fillStyle='#ffd43b';ctx.shadowColor='#ffcf33';ctx.shadowBlur=12;ctx.fill();ctx.lineWidth=2;ctx.strokeStyle='#fff8b0';ctx.stroke();ctx.restore();ctx.shadowColor='transparent'}
function draw(){let r=canvas.getBoundingClientRect(),t=performance.now()/1000;ctx.clearRect(0,0,r.width,r.height);let g=ctx.createLinearGradient(0,0,0,r.height);g.addColorStop(0,'#9ee6ff');g.addColorStop(.35,'#d7ffd4');g.addColorStop(1,'#8bd36a');ctx.fillStyle=g;ctx.fillRect(0,0,r.width,r.height);for(let f of flowers){ctx.font=`${f.s}px serif`;ctx.globalAlpha=.55;ctx.fillText(f.e,f.x*r.width,f.y*r.height)}ctx.globalAlpha=1;ctx.fillStyle='#dff5a7';roundedRect(ox,oy,cfg.cols*cell,cfg.rows*cell,16);ctx.fill();ctx.beginPath();ctx.lineWidth=wall+5;ctx.lineCap='round';ctx.strokeStyle='#5f9f48';for(let y=0;y<cfg.rows;y++)for(let x=0;x<cfg.cols;x++){let c=maze[y][x],x0=ox+x*cell,y0=oy+y*cell,x1=x0+cell,y1=y0+cell;if(c.w.t){ctx.moveTo(x0,y0);ctx.lineTo(x1,y0)}if(c.w.l){ctx.moveTo(x0,y0);ctx.lineTo(x0,y1)}if(x===cfg.cols-1&&c.w.r){ctx.moveTo(x1,y0);ctx.lineTo(x1,y1)}if(y===cfg.rows-1&&c.w.b){ctx.moveTo(x0,y1);ctx.lineTo(x1,y1)}}ctx.stroke();ctx.strokeStyle='#b9e979';ctx.lineWidth=wall;ctx.stroke();for(let s of stars)if(!s.taken)drawStar(s.x,s.y,cell*.27,t*1.6+s.p);ctx.font=`${goal.r*1.8}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.globalAlpha=goal.open?1:.35;ctx.fillText('🌈',goal.x,goal.y);ctx.globalAlpha=1;if(!goal.open){ctx.font=`${goal.r*.85}px serif`;ctx.fillText('🔒',goal.x,goal.y+2)}ctx.save();ctx.translate(ball.x,ball.y);ctx.font=`${ball.r*2.25}px serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='#fff';ctx.shadowBlur=8;ctx.fillText(chars[charIndex]?.e||'🦄',0,1);ctx.restore();for(let p of particles){ctx.globalAlpha=Math.max(0,p.life);ctx.font='18px serif';ctx.fillText(p.e,p.x,p.y)}ctx.globalAlpha=1}
function loop(now){update((now-last)/1000);last=now;draw();requestAnimationFrame(loop)}
function characterMenu(){let buttons=chars.map((c,i)=>`<button class="char ${c.need>total?'locked':''} ${i===charIndex?'selected':''}" data-i="${i}" ${c.need>total?'disabled':''}>${c.e}<small style="display:block;font-size:9px">${c.need>total?'⭐ '+c.need:c.n}</small></button>`).join('');overlay.innerHTML=`<div class="card"><h1>Vyber kamaráda</h1><div class="characters">${buttons}</div><p>Další kamarádi se odemknou za nasbírané hvězdičky.</p><button id="closeChars" class="btn pink">Hotovo</button></div>`;overlay.classList.remove('hidden');overlay.querySelectorAll('.char:not(.locked)').forEach(b=>b.onclick=()=>{charIndex=+b.dataset.i;save();characterMenu()});$('closeChars').onclick=()=>overlay.classList.add('hidden')}
canvas.onpointerdown=e=>{drag={x:e.clientX,y:e.clientY};canvas.setPointerCapture(e.pointerId)};canvas.onpointermove=e=>{if(drag){tilt.x=Math.max(-1,Math.min(1,(e.clientX-drag.x)/65));tilt.y=Math.max(-1,Math.min(1,(e.clientY-drag.y)/65))}};canvas.onpointerup=canvas.onpointercancel=()=>{drag=null;tilt.x*=.15;tilt.y*=.15};
$('start').onclick=async()=>{await sensors();overlay.classList.add('hidden');newGame()};$('restart').onclick=newGame;$('difficulty').onchange=newGame;$('characters').onclick=characterMenu;$('calibrate').onclick=()=>{cal.beta+=raw.y;cal.gamma+=raw.x;raw={x:0,y:0};tilt={x:0,y:0};$('status').textContent='Náklon srovnán ✓'};addEventListener('resize',resize);if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});cfg=presets.easy;generate();placeObjects();resize();updateUI();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
