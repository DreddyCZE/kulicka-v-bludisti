<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#101820">
<link rel="manifest" href="manifest.json">
<title>Kulička v bludišti</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:radial-gradient(circle at top,#25384a,#0b1118 70%);font-family:system-ui,sans-serif;color:#f4f7fb;touch-action:none}#app{height:100%;display:grid;grid-template-rows:auto 1fr auto;gap:8px;padding:max(8px,env(safe-area-inset-top)) 10px max(8px,env(safe-area-inset-bottom))}.bar{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap;background:rgba(12,20,28,.9);border:1px solid rgba(255,255,255,.15);border-radius:14px;padding:9px 11px}.stats{display:flex;gap:14px;font-size:14px}.label{display:block;color:#aab7c4;font-size:11px}.value{font-weight:800;font-variant-numeric:tabular-nums}button,select{border:1px solid rgba(255,255,255,.15);background:#1d2a36;color:#fff;border-radius:10px;padding:10px 12px;font:inherit;font-weight:700}button:active{transform:scale(.98)}.primary{background:#167b65}#wrap{min-height:0;position:relative;display:grid;place-items:center}canvas{display:block;width:100%;height:100%;border-radius:16px;box-shadow:0 14px 40px rgba(0,0,0,.35)}#overlay{position:absolute;inset:0;display:grid;place-items:center;padding:20px;background:rgba(0,0,0,.48);border-radius:16px}.hidden{display:none!important}.dialog{max-width:420px;background:#101820;border:1px solid rgba(255,255,255,.15);border-radius:18px;padding:22px;text-align:center}.dialog h1{margin:0 0 8px}.dialog p{color:#aab7c4;line-height:1.45}.hint{position:absolute;bottom:9px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:11px;background:rgba(0,0,0,.5);padding:5px 8px;border-radius:20px;color:#d7dde3;pointer-events:none}#status{font-size:12px;color:#aab7c4}
</style>
</head>
<body>
<div id="app">
 <div class="bar"><div class="stats"><div><span class="label">Čas</span><span id="time" class="value">0.0 s</span></div><div><span class="label">Pokusy</span><span id="attempts" class="value">1</span></div><div><span class="label">Obtížnost</span><span id="difficultyText" class="value">Střední</span></div></div><button id="restart">Nové bludiště</button></div>
 <div id="wrap"><canvas id="game"></canvas><div class="hint">Nakláněj zařízení nebo táhni prstem</div><div id="overlay"><div class="dialog"><h1>Kulička v bludišti</h1><p>Drž zařízení přibližně rovně, spusť hru a náklonem dostaň kuličku do zeleného cíle.</p><button id="start" class="primary">Spustit hru</button></div></div></div>
 <div class="bar" style="justify-content:center"><select id="difficulty"><option value="easy">Lehká</option><option value="medium" selected>Střední</option><option value="hard">Těžká</option></select><button id="calibrate">Kalibrovat náklon</button><span id="status">Senzor čeká</span></div>
</div>
<script>
(()=>{'use strict';
const $=id=>document.getElementById(id),canvas=$('game'),ctx=canvas.getContext('2d'),wrap=$('wrap'),overlay=$('overlay');
const presets={easy:{cols:9,rows:12,accel:520,max:330,label:'Lehká'},medium:{cols:13,rows:17,accel:650,max:390,label:'Střední'},hard:{cols:17,rows:22,accel:780,max:450,label:'Těžká'}};
let cfg=presets.medium,maze=[],cell=25,ox=0,oy=0,wall=4,ball={x:0,y:0,vx:0,vy:0,r:7},goal={x:0,y:0,r:10},tilt={x:0,y:0},raw={x:0,y:0},cal={beta:0,gamma:0},running=false,done=false,attempts=1,startAt=0,last=performance.now(),sensorSeen=false,drag=null;
function generate(){maze=Array.from({length:cfg.rows},(_,y)=>Array.from({length:cfg.cols},(_,x)=>({x,y,seen:false,w:{t:1,r:1,b:1,l:1}})));let cur=maze[0][0],stack=[],seen=1,total=cfg.cols*cfg.rows;cur.seen=true;while(seen<total){let n=[],x=cur.x,y=cur.y;if(y&& !maze[y-1][x].seen)n.push(['t',maze[y-1][x]]);if(x<cfg.cols-1&&!maze[y][x+1].seen)n.push(['r',maze[y][x+1]]);if(y<cfg.rows-1&&!maze[y+1][x].seen)n.push(['b',maze[y+1][x]]);if(x&& !maze[y][x-1].seen)n.push(['l',maze[y][x-1]]);if(n.length){let [d,next]=n[Math.floor(Math.random()*n.length)];stack.push(cur);if(d==='t'){cur.w.t=0;next.w.b=0}if(d==='r'){cur.w.r=0;next.w.l=0}if(d==='b'){cur.w.b=0;next.w.t=0}if(d==='l'){cur.w.l=0;next.w.r=0}cur=next;cur.seen=true;seen++}else cur=stack.pop()}for(let i=0;i<Math.floor(total*.08);i++){let x=Math.floor(Math.random()*cfg.cols),y=Math.floor(Math.random()*cfg.rows);if(x<cfg.cols-1&&Math.random()<.5){maze[y][x].w.r=0;maze[y][x+1].w.l=0}else if(y<cfg.rows-1){maze[y][x].w.b=0;maze[y+1][x].w.t=0}}}
function resize(){let r=wrap.getBoundingClientRect(),d=Math.min(devicePixelRatio||1,2);canvas.width=Math.floor(r.width*d);canvas.height=Math.floor(r.height*d);canvas.style.width=r.width+'px';canvas.style.height=r.height+'px';ctx.setTransform(d,0,0,d,0,0);cell=Math.max(13,Math.floor(Math.min((r.width-20)/cfg.cols,(r.height-20)/cfg.rows)));ox=Math.floor((r.width-cfg.cols*cell)/2);oy=Math.floor((r.height-cfg.rows*cell)/2);wall=Math.max(3,cell*.13);ball.r=Math.max(5,cell*.24);goal.r=Math.max(7,cell*.29);reset(false)}
function reset(count=true){if(count)attempts++;$('attempts').textContent=attempts;ball.x=ox+cell/2;ball.y=oy+cell/2;ball.vx=ball.vy=0;goal.x=ox+(cfg.cols-.5)*cell;goal.y=oy+(cfg.rows-.5)*cell}
function newGame(){cfg=presets[$('difficulty').value];$('difficultyText').textContent=cfg.label;attempts=1;$('attempts').textContent=1;done=false;generate();resize();startAt=performance.now();running=true}
function orientation(e){if(e.beta==null||e.gamma==null)return;sensorSeen=true;$('status').textContent='Senzor aktivní';let g=e.gamma-cal.gamma,b=e.beta-cal.beta,a=screen.orientation?.angle??window.orientation??0,x=g,y=b;if(a===90){x=b;y=-g}else if(a===270||a===-90){x=-b;y=g}else if(a===180){x=-g;y=-b}raw={x,y};tilt.x+=(Math.max(-22,Math.min(22,x))/22-tilt.x)*.18;tilt.y+=(Math.max(-22,Math.min(22,y))/22-tilt.y)*.18}
async function sensors(){try{if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){if(await DeviceOrientationEvent.requestPermission()!=='granted')throw Error()}addEventListener('deviceorientation',orientation,true);$('status').textContent='Čekám na náklon…';setTimeout(()=>{if(!sensorSeen)$('status').textContent='Použij dotyk nebo povol senzor'},1800)}catch{$('status').textContent='Senzor nepovolen'}}
function current(){let x=Math.floor((ball.x-ox)/cell),y=Math.floor((ball.y-oy)/cell);return x>=0&&y>=0&&x<cfg.cols&&y<cfg.rows?maze[y][x]:null}
function collide(axis){for(let i=0;i<3;i++){let c=current();if(!c){reset();return}let l=ox+c.x*cell,t=oy+c.y*cell,r=l+cell,b=t+cell,p=wall/2;if(axis==='x'){if(c.w.l&&ball.x-ball.r<l+p){ball.x=l+p+ball.r;ball.vx=Math.abs(ball.vx)*.25}if(c.w.r&&ball.x+ball.r>r-p){ball.x=r-p-ball.r;ball.vx=-Math.abs(ball.vx)*.25}}else{if(c.w.t&&ball.y-ball.r<t+p){ball.y=t+p+ball.r;ball.vy=Math.abs(ball.vy)*.25}if(c.w.b&&ball.y+ball.r>b-p){ball.y=b-p-ball.r;ball.vy=-Math.abs(ball.vy)*.25}}}}
function update(dt){if(!running||done)return;dt=Math.min(dt,.025);ball.vx+=tilt.x*cfg.accel*dt;ball.vy+=tilt.y*cfg.accel*dt;let f=Math.pow(.987,dt*60);ball.vx*=f;ball.vy*=f;let speed=Math.hypot(ball.vx,ball.vy);if(speed>cfg.max){ball.vx=ball.vx/speed*cfg.max;ball.vy=ball.vy/speed*cfg.max}let steps=Math.max(1,Math.ceil(speed*dt/Math.max(3,ball.r*.6))),s=dt/steps;for(let i=0;i<steps;i++){ball.x+=ball.vx*s;collide('x');ball.y+=ball.vy*s;collide('y')}let elapsed=(performance.now()-startAt)/1000;$('time').textContent=elapsed.toFixed(1)+' s';if(Math.hypot(ball.x-goal.x,ball.y-goal.y)<goal.r*.9){done=true;overlay.innerHTML=`<div class="dialog"><h1>Hotovo!</h1><p>Čas: <b>${elapsed.toFixed(1)} s</b><br>Pokusy: <b>${attempts}</b></p><button id="again" class="primary">Hrát znovu</button></div>`;overlay.classList.remove('hidden');$('again').onclick=()=>{overlay.classList.add('hidden');newGame()}}}
function draw(){let r=canvas.getBoundingClientRect(),g=ctx.createLinearGradient(0,0,r.width,r.height);ctx.clearRect(0,0,r.width,r.height);g.addColorStop(0,'#e8d8b1');g.addColorStop(1,'#b89c67');ctx.fillStyle=g;ctx.fillRect(0,0,r.width,r.height);ctx.fillStyle='#cdb783';ctx.fillRect(ox,oy,cfg.cols*cell,cfg.rows*cell);ctx.beginPath();ctx.arc(goal.x,goal.y,goal.r,0,7);ctx.fillStyle='#1e8c67';ctx.fill();ctx.beginPath();ctx.arc(goal.x,goal.y,goal.r*.5,0,7);ctx.fillStyle='#76f0bd';ctx.fill();ctx.beginPath();ctx.lineWidth=wall;ctx.lineCap='round';ctx.strokeStyle='#3a2a1a';for(let y=0;y<cfg.rows;y++)for(let x=0;x<cfg.cols;x++){let c=maze[y][x],x0=ox+x*cell,y0=oy+y*cell,x1=x0+cell,y1=y0+cell;if(c.w.t){ctx.moveTo(x0,y0);ctx.lineTo(x1,y0)}if(c.w.l){ctx.moveTo(x0,y0);ctx.lineTo(x0,y1)}if(x===cfg.cols-1&&c.w.r){ctx.moveTo(x1,y0);ctx.lineTo(x1,y1)}if(y===cfg.rows-1&&c.w.b){ctx.moveTo(x0,y1);ctx.lineTo(x1,y1)}}ctx.stroke();let bg=ctx.createRadialGradient(ball.x-ball.r*.35,ball.y-ball.r*.4,1,ball.x,ball.y,ball.r);bg.addColorStop(0,'#fff');bg.addColorStop(.35,'#dce5ed');bg.addColorStop(1,'#28333d');ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,7);ctx.fillStyle=bg;ctx.shadowColor='#0008';ctx.shadowBlur=8;ctx.shadowOffsetY=4;ctx.fill();ctx.shadowColor='transparent'}
function loop(now){update((now-last)/1000);last=now;draw();requestAnimationFrame(loop)}
canvas.onpointerdown=e=>{drag={x:e.clientX,y:e.clientY};canvas.setPointerCapture(e.pointerId)};canvas.onpointermove=e=>{if(drag){tilt.x=Math.max(-1,Math.min(1,(e.clientX-drag.x)/70));tilt.y=Math.max(-1,Math.min(1,(e.clientY-drag.y)/70))}};canvas.onpointerup=canvas.onpointercancel=()=>{drag=null;tilt.x*=.2;tilt.y*=.2};
$('start').onclick=async()=>{await sensors();overlay.classList.add('hidden');newGame()};$('restart').onclick=newGame;$('difficulty').onchange=newGame;$('calibrate').onclick=()=>{cal.beta+=raw.y;cal.gamma+=raw.x;raw={x:0,y:0};tilt={x:0,y:0};$('status').textContent='Náklon kalibrován'};addEventListener('resize',resize);if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});generate();resize();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
