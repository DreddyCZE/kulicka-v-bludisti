<!doctype html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#ff87c8">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/game.css">
  <title>Kouzelná zahrada</title>
</head>
<body>
  <main class="app">
    <header class="panel topbar">
      <div class="brand"><span class="brand-mark">★</span><div><strong>Kouzelná zahrada</strong><small id="worldName">Květinová louka</small></div></div>
      <div class="stats">
        <span><small>ÚROVEŇ</small><b id="level">1</b></span>
        <span><small>HVĚZDY</small><b id="starCount">0 / 3</b></span>
        <span><small>ODMĚNY</small><b id="totalStars">0</b></span>
      </div>
      <button id="restart" class="button secondary" aria-label="Nová zahrada">↻</button>
    </header>

    <section id="wrap" class="game-wrap">
      <canvas id="game" aria-label="Herní plocha"></canvas>
      <div id="toast" class="toast" role="status">Skvělé!</div>
      <div class="hint">Nakláněj zařízení nebo táhni prstem</div>
      <div id="overlay" class="overlay">
        <div class="card intro-card">
          <div class="hero-preview"><span class="spark">✦</span><canvas id="heroPreview" width="180" height="130"></canvas></div>
          <h1>Kouzelná zahrada</h1>
          <p>Pomoz Lili najít hvězdičky, klíček a duhovou bránu.</p>
          <button id="start" class="button primary big">Začít dobrodružství</button>
        </div>
      </div>
    </section>

    <footer class="panel controls">
      <select id="difficulty" aria-label="Velikost zahrady">
        <option value="easy">Malá zahrada</option>
        <option value="medium">Velká zahrada</option>
      </select>
      <button id="characters" class="button secondary">Kamarádi</button>
      <button id="album" class="button secondary">Album</button>
      <button id="calibrate" class="button secondary">Srovnat</button>
      <span id="status" class="status">Senzor čeká</span>
    </footer>
  </main>
  <script type="module" src="js/main.js"></script>
</body>
</html>
